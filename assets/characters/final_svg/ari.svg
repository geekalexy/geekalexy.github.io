<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="512" height="512" shape-rendering="crispEdges">
  <!-- Ari - Blue Penguin with Golden Crest -->
  <!-- Crest -->
  <rect x="7" y="0" width="2" height="1" fill="#F5A623"/>
  <!-- Head top (blue hood) -->
  <rect x="5" y="1" width="6" height="1" fill="#1A3A8A"/>
  <rect x="4" y="2" width="8" height="1" fill="#1A3A8A"/>
  <rect x="3" y="2" width="1" height="1" fill="#1A3A8A"/>
  <rect x="12" y="2" width="1" height="1" fill="#1A3A8A"/>
  <!-- Face -->
  <rect x="3" y="3" width="1" height="1" fill="#1A3A8A"/>
  <rect x="4" y="3" width="1" height="1" fill="#B3D4FF"/>
  <rect x="5" y="3" width="6" height="1" fill="#FFE8A0"/>
  <rect x="11" y="3" width="1" height="1" fill="#B3D4FF"/>
  <rect x="12" y="3" width="1" height="1" fill="#1A3A8A"/>
  <!-- Eyes row -->
  <rect x="3" y="4" width="1" height="1" fill="#1A3A8A"/>
  <rect x="4" y="4" width="2" height="2" fill="#FFE8A0"/>
  <rect x="5" y="4" width="1" height="1" fill="#1A3A8A"/>
  <rect x="6" y="4" width="1" height="1" fill="#B3D4FF"/>
  <rect x="7" y="4" width="2" height="1" fill="#FFE8A0"/>
  <rect x="9" y="4" width="1" height="1" fill="#B3D4FF"/>
  <rect x="10" y="4" width="2" height="2" fill="#FFE8A0"/>
  <rect x="10" y="4" width="1" height="1" fill="#1A3A8A"/>
  <rect x="12" y="4" width="1" height="1" fill="#1A3A8A"/>
  <!-- Eye lower + cheeks -->
  <rect x="4" y="5" width="1" height="1" fill="#2563C9"/>
  <rect x="5" y="5" width="1" height="1" fill="#2563C9"/>
  <rect x="6" y="5" width="4" height="1" fill="#FFE8A0"/>
  <rect x="10" y="5" width="1" height="1" fill="#2563C9"/>
  <rect x="11" y="5" width="1" height="1" fill="#2563C9"/>
  <!-- Beak -->
  <rect x="7" y="5" width="2" height="1" fill="#D4700E"/>
  <!-- Mouth/chin -->
  <rect x="5" y="6" width="6" height="1" fill="#FFE8A0"/>
  <rect x="7" y="6" width="2" height="1" fill="#F5A623"/>
  <!-- Body -->
  <rect x="3" y="7" width="1" height="1" fill="#2563C9"/>
  <rect x="4" y="7" width="8" height="3" fill="#2563C9"/>
  <rect x="12" y="7" width="1" height="1" fill="#2563C9"/>
  <!-- White belly -->
  <rect x="5" y="7" width="6" height="2" fill="#E8F0FF"/>
  <rect x="6" y="7" width="4" height="2" fill="#FFE8A0"/>
  <rect x="7" y="8" width="2" height="1" fill="#F5A623"/>
  <!-- Arms -->
  <rect x="2" y="8" width="1" height="1" fill="#FFE082"/>
  <rect x="2" y="7" width="1" height="1" fill="#2563C9"/>
  <rect x="1" y="8" width="1" height="1" fill="#FFE082"/>
  <rect x="13" y="8" width="1" height="1" fill="#FFE082"/>
  <rect x="13" y="7" width="1" height="1" fill="#2563C9"/>
  <rect x="14" y="8" width="1" height="1" fill="#FFE082"/>
  <!-- Lower body -->
  <rect x="4" y="10" width="8" height="1" fill="#1A3A8A"/>
  <!-- Legs -->
  <rect x="5" y="11" width="2" height="1" fill="#1A3A8A"/>
  <rect x="9" y="11" width="2" height="1" fill="#1A3A8A"/>
  <!-- Feet -->
  <rect x="4" y="12" width="3" height="1" fill="#2563C9"/>
  <rect x="9" y="12" width="3" height="1" fill="#2563C9"/>
</svg>