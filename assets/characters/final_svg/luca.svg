  <rect x="8" y="8" width="3" height="2" fill="#3A38A0"/>
  <rect x="11" y="8" width="3" height="1" fill="#4A44D4"/>
  <rect x="14" y="8" width="1" height="1" fill="#B3C1FF"/>
  <rect x="5" y="9" width="1" height="1" fill="#8FA3E6"/>
  <rect x="6" y="9" width="1" height="1" fill="#8FA3E6"/>
