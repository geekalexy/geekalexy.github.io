<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="512" height="512" shape-rendering="crispEdges">
  <!-- Lumi - Yellow/Gold Glowing Robot -->
  <!-- Antenna -->
  <rect x="7" y="1" width="1" height="1" fill="#FFE082"/>
  <!-- Sparkles -->
  <rect x="4" y="2" width="1" height="1" fill="#FFF3C4"/>
  <rect x="11" y="2" width="1" height="1" fill="#FFF3C4"/>
  <rect x="2" y="4" width="1" height="1" fill="#FFF3C4"/>
  <rect x="13" y="4" width="1" height="1" fill="#FFF3C4"/>
  <!-- Head top -->
  <rect x="5" y="2" width="6" height="1" fill="#F5B800"/>
  <rect x="6" y="2" width="4" height="1" fill="#FFD54F"/>
  <!-- Head -->
  <rect x="4" y="3" width="8" height="1" fill="#F5B800"/>
  <rect x="5" y="3" width="6" height="1" fill="#FFCA28"/>
  <!-- Face -->
  <rect x="4" y="4" width="8" height="1" fill="#FFCA28"/>
  <rect x="5" y="4" width="2" height="1" fill="#FFFFFF"/>
  <rect x="6" y="4" width="1" height="1" fill="#8B5E00"/>
  <rect x="9" y="4" width="2" height="1" fill="#FFFFFF"/>
  <rect x="9" y="4" width="1" height="1" fill="#8B5E00"/>
  <!-- Mouth area -->
  <rect x="6" y="5" width="4" height="1" fill="#E09800"/>
  <!-- Neck -->
  <rect x="7" y="6" width="2" height="1" fill="#E09800"/>
  <!-- Body -->
  <rect x="2" y="7" width="1" height="1" fill="#FFD54F"/>
  <rect x="3" y="7" width="10" height="1" fill="#E09800"/>
  <rect x="13" y="7" width="1" height="1" fill="#FFD54F"/>
  <rect x="1" y="8" width="1" height="1" fill="#FFF3C4"/>
  <rect x="2" y="8" width="3" height="2" fill="#E09800"/>
  <rect x="5" y="8" width="3" height="1" fill="#F5B800"/>
  <rect x="8" y="8" width="3" height="2" fill="#E09800"/>
  <rect x="11" y="8" width="2" height="1" fill="#F0A500"/>
  <rect x="13" y="8" width="1" height="1" fill="#FFD54F"/>
  <rect x="14" y="8" width="1" height="1" fill="#FFF3C4"/>
  <!-- Belly detail -->
  <rect x="6" y="9" width="2" height="1" fill="#FFFFFF"/>
  <rect x="8" y="9" width="1" height="1" fill="#FFFFFF"/>
  <!-- Legs -->
  <rect x="5" y="10" width="2" height="2" fill="#CC8400"/>
  <rect x="9" y="10" width="2" height="2" fill="#CC8400"/>
  <!-- Feet -->
  <rect x="4" y="12" width="3" height="1" fill="#8B5E00"/>
  <rect x="9" y="12" width="3" height="1" fill="#8B5E00"/>
</svg>