<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="512" height="512" shape-rendering="crispEdges">
  <!-- Nova - Purple Robot with Golden Crown -->
  <!-- Crown -->
  <rect x="7" y="0" width="2" height="1" fill="#F5A623"/>
  <rect x="6" y="1" width="4" height="1" fill="#F5A623"/>
  <rect x="7" y="1" width="2" height="1" fill="#FFD54F"/>
  <!-- Sparkles -->
  <rect x="3" y="1" width="1" height="1" fill="#E8E0FF"/>
  <rect x="12" y="2" width="1" height="1" fill="#E8E0FF"/>
  <rect x="1" y="5" width="1" height="1" fill="#E8E0FF"/>
  <rect x="14" y="6" width="1" height="1" fill="#E8E0FF"/>
  <!-- Head -->
  <rect x="4" y="2" width="8" height="1" fill="#7B2FBE"/>
  <rect x="3" y="3" width="2" height="1" fill="#7B2FBE"/>
  <rect x="5" y="3" width="2" height="1" fill="#FFFFFF"/>
  <rect x="7" y="3" width="2" height="1" fill="#7B2FBE"/>
  <rect x="9" y="3" width="2" height="1" fill="#FFFFFF"/>
  <rect x="11" y="3" width="2" height="1" fill="#7B2FBE"/>
  <!-- Pupils -->
  <rect x="7" y="3" width="1" height="1" fill="#2D1050"/>
  <rect x="8" y="3" width="1" height="1" fill="#2D1050"/>
  <!-- Mouth area -->
  <rect x="5" y="4" width="6" height="1" fill="#C4B0E8"/>
  <!-- Neck -->
  <rect x="7" y="5" width="2" height="1" fill="#7B2FBE"/>
  <!-- Body -->
  <rect x="2" y="6" width="1" height="1" fill="#5A1E9E"/>
  <rect x="3" y="6" width="1" height="2" fill="#9B6BD4"/>
  <rect x="4" y="6" width="8" height="1" fill="#7B2FBE"/>
  <rect x="12" y="6" width="1" height="2" fill="#9B6BD4"/>
  <rect x="13" y="6" width="1" height="1" fill="#5A1E9E"/>
  <rect x="1" y="7" width="1" height="1" fill="#5A1E9E"/>
  <rect x="2" y="7" width="2" height="2" fill="#9B6BD4"/>
  <rect x="4" y="7" width="3" height="2" fill="#7B2FBE"/>
  <rect x="7" y="7" width="2" height="1" fill="#F5A623"/>
  <rect x="9" y="7" width="3" height="2" fill="#7B2FBE"/>
  <rect x="12" y="7" width="2" height="2" fill="#9B6BD4"/>
  <rect x="14" y="7" width="1" height="1" fill="#5A1E9E"/>
  <!-- Belt buckle -->
  <rect x="6" y="8" width="1" height="1" fill="#F5A623"/>
  <rect x="7" y="8" width="2" height="1" fill="#FFD54F"/>
  <rect x="9" y="8" width="1" height="1" fill="#F5A623"/>
  <!-- Legs -->
  <rect x="5" y="9" width="2" height="2" fill="#5A1E9E"/>
  <rect x="9" y="9" width="2" height="2" fill="#5A1E9E"/>
  <!-- Feet -->
  <rect x="4" y="11" width="3" height="1" fill="#2D1050"/>
  <rect x="9" y="11" width="3" height="1" fill="#2D1050"/>
</svg>